version: '3.9'

services:
  # ── Backend (Node.js / Express) ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthybytes-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/serviceAccount.json
      FRONTEND_URL: http://localhost
    ports:
      - "5000:5000"
    volumes:
      # Mount Firebase service account key (if you have one)
      - ./secrets:/secrets:ro
    networks:
      - healthybytes-net

  # ── Frontend (Vite → Nginx) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthybytes-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - healthybytes-net

networks:
  healthybytes-net:
    driver: bridge
